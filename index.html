<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

<header>
    <h1>Registration Form</h1>
</header>

<main>

<section class="registration-form">
    <h4>Teacher and Student Registration</h4>
    <form action="/submit" method="POST">

<label for="user-name" class="form-label">Name:</label>
<input type="text" id="user-name" name="user-name" required>

<br>

<label for="user-email" class="form-label">Email:</label>
<input type="email" id="user-email" name="user-email" required>

<br>

<label for="user-password" class="form-label">Password:</label>
<input type="password" id="user-password" name="user-password" required>    

<br>

<label for="terms">I agree to the terms and conditions</label>
<input type="checkbox" id="terms" name="terms" required>

<br>

<label for="student">Student</label>
<input type="radio" id="student" name="role" value="student">

<label for="teacher">Teacher</label>
<input type="radio" id="teacher" name="role" value="teacher">

<br>

<button type="submit">Register</button>
<hr>
</section>


<section class="table-seminars">

<table>
    <caption>Seminars</caption>
    <thead>
        <tr>
            <th>Day</th>
            <th>Time</th>
            <th>Topic</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Monday</td>
            <td>10:00 AM</td>
            <td>Introduction to HTML</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>2:00 PM</td>
            <td>Advanced CSS Techniques</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>11:00 AM</td>
            <td>JavaScript Basics</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3">Total: 3 seminars per week</td>
        </tr>
    </tfoot>
</table>
</section>
</main>
<footer>
    <p>&copy; 2026 Registration Form. All rights reserved.</p>
</body>
</html>
